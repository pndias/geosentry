version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: postgis_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=geodata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  worker:
    build: .
    container_name: python_worker
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=geodata
      - DB_USER=postgres
      - DB_PASS=postgres
    restart: on-failure

volumes:
  postgres_data:
