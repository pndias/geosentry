version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: geosentry_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=geodata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: 
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: geosentry_api
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=geodata
      - DB_USER=postgres
      - DB_PASS=postgres
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    restart: on-failure

  dashboard:
    image: nginx:alpine
    container_name: geosentry_ui
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - api

volumes:
  postgres_data:
