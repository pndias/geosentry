version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geodata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - geosentry
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api:
    image: geosentry/api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geodata
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    networks:
      - geosentry
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  agents:
    image: geosentry/agents:latest
    build:
      context: .
      dockerfile: docker/agents.Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ollama/llama3.2:3b
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geodata
      PYTHONPATH: /app
    networks:
      - geosentry
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ingestion:
    image: geosentry/ingestion:latest
    build:
      context: .
      dockerfile: docker/ingestion.Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geodata
      PYTHONPATH: /app
    networks:
      - geosentry
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  seed:
    image: geosentry/seed:latest
    build:
      context: .
      dockerfile: docker/seed.Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geodata
      PYTHONPATH: /app
    networks:
      - geosentry
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  frontend:
    image: geosentry/frontend:latest
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8080:80"
    networks:
      - geosentry
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - geosentry
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  geosentry:
    driver: overlay

volumes:
  postgres_data:
  ollama_data:
