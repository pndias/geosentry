<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoSentry | Global Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #0b0e14;
            --sidebar-bg: #151921;
            --text-color: #e0e6ed;
            --accent-color: #3b82f6;
            --border-color: #2d3748;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); overflow: hidden; }
        
        #layout { display: flex; height: 100vh; }
        
        #sidebar { width: 350px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #1a1a1a; }

        .header { padding: 20px; border-bottom: 1px solid var(--border-color); }
        .header h1 { margin: 0; font-size: 1.5rem; color: var(--accent-color); }
        .header p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.7; }

        .filters { padding: 15px; background: #1c232d; border-bottom: 1px solid var(--border-color); }
        .filters select { width: 100%; padding: 8px; background: #0b0e14; border: 1px solid var(--border-color); color: white; border-radius: 4px; }

        .event-list { flex-grow: 1; padding: 10px; }
        .event-item { padding: 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s; border-radius: 4px; margin-bottom: 5px; }
        .event-item:hover { background: #242c37; }
        .event-item h3 { margin: 0 0 5px; font-size: 1rem; }
        .event-item .meta { font-size: 0.75rem; display: flex; justify-content: space-between; opacity: 0.8; }
        
        .badge { padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .badge-militar { background: #e53e3e; color: white; }
        .badge-politica { background: #3182ce; color: white; }
        .badge-economica { background: #38a169; color: white; }
        .badge-simbolica { background: #805ad5; color: white; }

        .popup-content b { font-size: 1.1rem; color: #3b82f6; }
        .popup-content p { margin: 10px 0; font-size: 0.9rem; line-height: 1.4; color: #333; }
        .popup-content .footer { font-size: 0.75rem; color: #666; font-style: italic; }

        /* Custom Leaflet Dark Mode hack */
        .leaflet-container { background: #1a1a1a !important; }
        .leaflet-tile-pane { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7); }
    </style>
</head>
<body>

<div id="layout">
    <div id="sidebar">
        <div class="header">
            <h1>🌍 GeoSentry</h1>
            <p>Monitoramento Geopolítico Global</p>
        </div>
        <div class="filters">
            <select id="categoryFilter">
                <option value="all">Todas as Categorias</option>
                <option value="Militar">Militar</option>
                <option value="Politica">Política</option>
                <option value="Economica">Econômica</option>
                <option value="Religiosa/Simbólica">Religiosa/Simbólica</option>
            </select>
        </div>
        <div id="eventList" class="event-list">
            <!-- Eventos serão carregados aqui -->
        </div>
    </div>
    <div id="map-container">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false
    }).setView([20, 0], 2);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let allEvents = [];
    let markers = [];

    function getColor(categoria) {
        switch(categoria) {
            case 'Militar': return '#e53e3e';
            case 'Politica': return '#3182ce';
            case 'Economica': return '#38a169';
            case 'Religiosa/Simbólica': return '#805ad5';
            default: return '#718096';
        }
    }

    function getBadgeClass(categoria) {
        if (categoria === 'Religiosa/Simbólica') return 'badge-simbolica';
        return 'badge-' + categoria.toLowerCase();
    }

    function updateDisplay(filter = 'all') {
        // Limpar marcadores
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        
        const listContainer = document.getElementById('eventList');
        listContainer.innerHTML = '';

        const filtered = filter === 'all' ? allEvents : allEvents.filter(e => e.categoria === filter);

        filtered.forEach(evento => {
            // Adicionar ao Mapa
            if (evento.coordenadas) {
                const marker = L.circleMarker([evento.coordenadas.lat, evento.coordenadas.lon], {
                    radius: 5 + (evento.impacto * 2),
                    fillColor: getColor(evento.categoria),
                    color: "#fff",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                })
                .addTo(map)
                .bindPopup(`
                    <div class="popup-content">
                        <b>${evento.titulo}</b>
                        <p>${evento.resumo_analitico}</p>
                        <div class="footer">Impacto: ${evento.impacto}/5 | Fontes: ${evento.fontes_citadas.join(', ')}</div>
                    </div>
                `);
                markers.push(marker);
            }

            // Adicionar à Lista
            const item = document.createElement('div');
            item.className = 'event-item';
            item.innerHTML = `
                <h3>${evento.titulo}</h3>
                <div class="meta">
                    <span class="badge ${getBadgeClass(evento.categoria)}">${evento.categoria}</span>
                    <span>Impacto: ${evento.impacto}</span>
                </div>
            `;
            item.onclick = () => {
                if(evento.coordenadas) {
                    map.flyTo([evento.coordenadas.lat, evento.coordenadas.lon], 5);
                }
            };
            listContainer.appendChild(item);
        });
    }

    async function fetchEvents() {
        try {
            const response = await fetch('http://localhost:8000/eventos');
            allEvents = await response.json();
            updateDisplay();
        } catch (error) {
            console.error("Erro ao carregar eventos:", error);
            document.getElementById('eventList').innerHTML = '<p style="padding:20px; color:red;">Erro ao conectar com a API do GeoSentry.</p>';
        }
    }

    document.getElementById('categoryFilter').onchange = (e) => {
        updateDisplay(e.target.value);
    };

    fetchEvents();
</script>
</body>
</html>
